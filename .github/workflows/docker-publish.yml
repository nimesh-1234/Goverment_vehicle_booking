name: Build and Publish to DockerHub 🚀

# 'main' branch එකට කෝඩ් එක push කළාම මේක වැඩ කරනවා
on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Code 📥
        uses: actions/checkout@v3

      - name: Log in to Docker Hub 🔑
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image 🐳
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 🚨 මෙන්න මෙතනට tags දෙකක් දාලා තියෙන්නේ. එතකොට එකම කෝඩ් එක ඉමේජ් දෙකටම ලොක් වෙනවා!
          tags: |
            nimesh869/vehicle-booking-app:latest
            nimesh869/vehicle-booking-web:latest

      - name: Trigger Server Update via Watchtower API 🚀
        run: |
          curl -H "Authorization: Bearer my_super_secret_token_123" \
               https://shortcake-caramel-hamlet.ngrok-free.dev/v1/update