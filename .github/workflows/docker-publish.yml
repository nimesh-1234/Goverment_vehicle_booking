name: Build and Publish to DockerHub 🚀

# 'main' branch එකට කෝඩ් එක push කළාම මේක වැඩ කරනවා
on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Code 📥
        uses: actions/checkout@v3

      - name: Log in to Docker Hub 🔑
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🚨 1. Laravel App ඉමේජ් එක බිල්ඩ් කිරීම (Target: app_base)
      - name: Build and Push App Image 🐳
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          target: app_base  # Dockerfile එකේ Stage 3 එක විතරක් වෙන් කරලා බිල්ඩ් කරයි
          tags: nimesh869/vehicle-booking-app:latest

      # 🚨 2. Nginx Web ඉමේජ් එක බිල්ඩ් කිරීම (Target: web)
      - name: Build and Push Web