name: Build and Publish to DockerHub 🚀

on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Code 📥
        uses: actions/checkout@v3

      - name: Log in to Docker Hub 🔑
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🐳 Laravel App ඉමේජ් එක බිල්ඩ් කිරීම
      - name: Build and Push App Image 🐳
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          target: app_base
          tags: nimesh869/vehicle-booking-app:latest

      # 🌐 Nginx Web ඉමේජ් එක බිල්ඩ් කිරීම
      - name: Build and Push Web Image 🌐
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          target: web
          tags: nimesh869/vehicle-booking-web:latest

      # 🚀 සර්වර් එකට සිග්නල් එක දීම
      - name: Trigger Server Update via Watchtower API 🚀
        run: |
          curl -H "Authorization: Bearer my_super_secret_token_123" \
               https://shortcake-caramel-hamlet.ngrok-free.dev/v1/update