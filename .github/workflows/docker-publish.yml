name: Build and Publish to DockerHub 🚀

# මේකෙන් කියන්නේ 'main' branch එකට කෝඩ් එක push කළාම මේක වැඩ කරන්න ඕනේ කියලයි
on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Code 📥
        uses: actions/checkout@v3

      - name: Log in to Docker Hub 🔑
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image 🐳
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: nimesh869/vehicle-booking-app:latest

      - name: Trigger Server Update via Watchtower API 🚀
        run: |
          curl -H "Authorization: Bearer my_super_secret_token_123" \
               http://YOUR_PUBLIC_IP:8080/v1/update